<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitCommit Pro v2 | Multi-line Commit Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --transition-speed: 0.3s; }
        body { font-family: 'Inter', sans-serif; transition: background-color var(--transition-speed), color var(--transition-speed); }
        .code-font { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6', secondary: '#64748b' } } }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-gray-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-800 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-primary p-2 rounded-lg text-white">
                    <i class="ph-bold ph-git-branch text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">GitCommit <span class="text-primary">Pro</span> <span class="text-xs bg-primary/10 text-primary px-2 py-0.5 rounded-full ml-1 uppercase">v2.0</span></h1>
            </div>
            <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                <i id="themeIcon" class="ph-bold ph-moon text-xl"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left: Input Section -->
            <div class="space-y-4">
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 font-semibold text-sm uppercase tracking-wider text-secondary">
                        <i class="ph ph-text-align-left"></i> Raw Message (Input)
                    </label>
                    <button onclick="clearInput()" class="text-xs text-red-500 hover:underline flex items-center gap-1">
                        <i class="ph ph-trash"></i> Clear
                    </button>
                </div>
                <textarea id="rawInput" placeholder="Enter your text here...&#10;Line gaps will be preserved as -m &quot; &quot;" class="w-full h-80 p-4 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary outline-none transition-all custom-scrollbar resize-none text-sm"></textarea>
            </div>

            <!-- Right: Output Section -->
            <div class="space-y-4 flex flex-col">
                <div>
                    <label class="flex items-center gap-2 font-semibold text-sm uppercase tracking-wider text-secondary mb-3">
                        <i class="ph ph-terminal-window"></i> Select Terminal
                    </label>
                    <div class="flex flex-wrap gap-2 p-1 bg-slate-200/50 dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800">
                        <button onclick="setShell('bash')" class="shell-tab px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 flex-1 justify-center bg-white dark:bg-slate-800 shadow-sm text-primary" data-shell="bash">
                            <i class="ph ph-linux-logo"></i> Bash/Zsh
                        </button>
                        <button onclick="setShell('powershell')" class="shell-tab px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 flex-1 justify-center hover:bg-white/50 dark:hover:bg-slate-800/50" data-shell="powershell">
                            <i class="ph ph-microsoft-windows-logo"></i> PowerShell
                        </button>
                        <button onclick="setShell('cmd')" class="shell-tab px-4 py-2 rounded-lg text-sm font-medium transition-all flex items-center gap-2 flex-1 justify-center hover:bg-white/50 dark:hover:bg-slate-800/50" data-shell="cmd">
                            <i class="ph ph-command"></i> CMD
                        </button>
                    </div>
                </div>

                <div class="flex-1 space-y-4">
                    <label class="flex items-center gap-2 font-semibold text-sm uppercase tracking-wider text-secondary">
                        <i class="ph ph-code-block"></i> Result (One-line Command)
                    </label>
                    <div class="relative">
                        <div id="outputContainer" class="w-full h-40 p-4 rounded-2xl border border-primary/20 bg-primary/5 dark:bg-primary/10 overflow-y-auto custom-scrollbar">
                            <code id="resultCode" class="code-font text-sm break-all whitespace-pre-wrap text-primary font-medium">git commit -m "..."</code>
                        </div>
                        <button onclick="copyCommand()" class="absolute top-3 right-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-2 rounded-lg shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2 text-xs font-bold">
                            <i id="copyIcon" class="ph ph-copy"></i> <span id="copyText">COPY</span>
                        </button>
                    </div>
                    
                    <div class="p-4 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-bold text-secondary uppercase">Preview Log</span>
                            <i class="ph ph-eye text-secondary"></i>
                        </div>
                        <div id="logPreview" class="text-xs code-font text-slate-500 dark:text-slate-400 space-y-1 italic">Waiting...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 pointer-events-none transition-all duration-300 flex items-center gap-2 z-[100]">
        <i class="ph-bold ph-check-circle text-green-400"></i>
        <span id="toastMsg">Copied!</span>
    </div>

    <script>
        const rawInput = document.getElementById('rawInput');
        const resultCode = document.getElementById('resultCode');
        const logPreview = document.getElementById('logPreview');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const toast = document.getElementById('toast');
        let currentShell = 'bash';

        window.onload = () => {
            rawInput.addEventListener('input', generateCommand);
            if (localStorage.theme === 'dark' || (!localStorage.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                themeIcon.classList.replace('ph-moon', 'ph-sun');
            }
        };

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            themeIcon.classList.replace(isDark ? 'ph-moon' : 'ph-sun', isDark ? 'ph-sun' : 'ph-moon');
        });

        function setShell(shell) {
            currentShell = shell;
            document.querySelectorAll('.shell-tab').forEach(btn => {
                if(btn.dataset.shell === shell) {
                    btn.classList.add('bg-white', 'dark:bg-slate-800', 'shadow-sm', 'text-primary');
                } else {
                    btn.classList.remove('bg-white', 'dark:bg-slate-800', 'shadow-sm', 'text-primary');
                }
            });
            generateCommand();
        }

        function generateCommand() {
            const text = rawInput.value; // Keep original to detect empty lines
            if (!text.trim()) {
                resultCode.innerText = 'git commit -m "Your message will appear here..."';
                logPreview.innerText = 'Waiting...';
                return;
            }

            // Split lines, but don't filter out empty ones
            const lines = text.split('\n');
            let command = 'git commit';
            
            lines.forEach(line => {
                // If line is empty or just whitespace, we still want a -m " "
                const content = line.trim() === "" ? " " : line;
                const escapedLine = escapeForShell(content, currentShell);
                command += ` -m "${escapedLine}"`;
            });

            resultCode.innerText = command;
            logPreview.innerHTML = lines.map((l, i) => i === 0 ? `<div class="font-bold text-slate-800 dark:text-slate-200">commit head</div><div class="ml-4 text-blue-500">${l || '&nbsp;'}</div>` : `<div class="ml-4">${l || '&nbsp;'}</div>`).join('');
        }

        function escapeForShell(str, shell) {
            if (str === " ") return " ";
            switch (shell) {
                case 'cmd':
                    return str.replace(/"/g, '\\"').replace(/[&|<>=^]/g, '^$&');
                case 'powershell':
                    return str.replace(/"/g, '`"').replace(/\$/g, '`$');
                default:
                    return str.replace(/"/g, '\\"').replace(/\`/g, '\\`').replace(/\$/g, '\\$');
            }
        }

        function clearInput() { rawInput.value = ''; generateCommand(); }

        function copyCommand() {
            const command = resultCode.innerText;
            if (!command || command.includes('message will appear')) return;
            const temp = document.createElement('textarea');
            temp.value = command;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            showToast('Command copied!');
        }

        function showToast(msg) {
            document.getElementById('toastMsg').innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translate(-50%, 0)'; }, 2000);
        }
    </script>
</body>
</html>
